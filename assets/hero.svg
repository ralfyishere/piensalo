<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="PIÉNSALO — Give any AI a better way to think.">
  <title>PIÉNSALO</title>
  <desc>Wordmark with the acute accent drawn as a brand mark, and the tagline: Give any AI a better way to think.</desc>

  <rect width="1200" height="400" fill="#10141C"/>

  <!-- wordmark: letters placed individually so the accent mark is geometry, not font rendering -->
  <g font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
     font-size="100" font-weight="800" fill="#F3EFE7" text-anchor="middle">
    <text x="271" y="196">P</text>
    <text x="365" y="196">I</text>
    <text x="459" y="196">E</text>
    <text x="553" y="196">N</text>
    <text x="647" y="196">S</text>
    <text x="741" y="196">A</text>
    <text x="835" y="196">L</text>
    <text x="929" y="196">O</text>
  </g>

  <!-- the accent: a deliberate rising stroke over the E — the brand mark -->
  <path d="M 437 112 L 456 78 L 483 78 L 464 112 Z" fill="#ECA43F"/>

  <!-- tagline -->
  <g font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" text-anchor="middle">
    <text x="600" y="258" font-size="31" fill="#C9CFDD">Give any AI a better way to think.</text>
  </g>

  <!-- subline -->
  <text x="600" y="308" text-anchor="middle" font-size="17" fill="#5D6678"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">piensalo — an open artificial cortex for AI models and agents</text>

  <!-- baseline rule with accent echo -->
  <line x1="271" y1="346" x2="905" y2="346" stroke="#2A3242" stroke-width="2"/>
  <path d="M 913 350 L 921 336 L 932 336 L 924 350 Z" fill="#ECA43F"/>
</svg>
