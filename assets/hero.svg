<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="Fable Think — give any AI a better way to think">
  <title>Fable Think</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f1a"/>
      <stop offset="1" stop-color="#131a2c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c6cf0"/>
      <stop offset="1" stop-color="#41d6a8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- loop glyph -->
  <g transform="translate(170,200)">
    <circle r="92" fill="none" stroke="#2a3450" stroke-width="10"/>
    <path d="M 0 -92 A 92 92 0 0 1 92 0" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
    <path d="M 92 6 l -12 -18 h 24 z" fill="#41d6a8"/>
    <!-- nodes: think / inspect / repair / verify -->
    <circle cx="0" cy="-92" r="9" fill="#7c6cf0"/>
    <circle cx="92" cy="0" r="9" fill="#41d6a8"/>
    <circle cx="0" cy="92" r="9" fill="#3d4a6b"/>
    <circle cx="-92" cy="0" r="9" fill="#3d4a6b"/>
    <!-- abstention: the loop may rest -->
    <circle r="26" fill="none" stroke="#3d4a6b" stroke-width="3" stroke-dasharray="4 6"/>
    <text y="7" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#8fa0c4">◦</text>
  </g>

  <!-- wordmark -->
  <g font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="330" y="185" font-size="84" font-weight="700" fill="#eef1f8" letter-spacing="-1">Fable <tspan fill="url(#accent)">Think</tspan></text>
    <text x="334" y="238" font-size="30" fill="#aab6d3">Give any AI a better way to think.</text>
    <text x="334" y="290" font-size="19" fill="#5d6b8f" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">think · inspect · repair · verify · loop · skill</text>
  </g>

  <!-- footer strip -->
  <text x="334" y="344" font-size="15" fill="#46527a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">an open cognitive operating system for AI models and agents · MIT</text>
</svg>
