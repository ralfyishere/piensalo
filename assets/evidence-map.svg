<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 420" role="img" aria-label="Evidence levels: DESIGNED to SMOKE_TESTED to EXPERIMENTALLY_TESTED to REPLICATED to PROMOTED, with NARROW and REJECTED side rails as honest exits.">
  <title>PIÉNSALO evidence levels</title>
  <desc>Five promotion levels on a main rail; NARROW and REJECTED drawn as side rails below.</desc>

  <rect width="1080" height="420" fill="#10141C"/>

  <text x="124" y="52" font-size="15" letter-spacing="4" fill="#98A0B3"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">EVIDENCE — HOW A CLAIM EARNS ITS LEVEL</text>
  <path d="M 62 52 L 71 36 L 84 36 L 75 52 Z" fill="#ECA43F"/>

  <!-- main rail: increasing solidity, left to right -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace"
     font-size="15" text-anchor="middle">
    <rect x="124" y="118" width="100" height="44" rx="8" fill="none" stroke="#5D6678" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="174" y="146" fill="#98A0B3">DESIGNED</text>

    <rect x="264" y="118" width="136" height="44" rx="8" fill="none" stroke="#5D6678" stroke-width="1.5"/>
    <text x="332" y="146" fill="#98A0B3">SMOKE_TESTED</text>

    <rect x="440" y="118" width="217" height="44" rx="8" fill="none" stroke="#A7AFBF" stroke-width="2"/>
    <text x="548.5" y="146" fill="#E8E4DA">EXPERIMENTALLY_TESTED</text>

    <rect x="697" y="118" width="118" height="44" rx="8" fill="none" stroke="#ECA43F" stroke-width="2"/>
    <text x="756" y="146" fill="#ECA43F">REPLICATED</text>

    <rect x="855" y="118" width="100" height="44" rx="8" fill="#34C29A" fill-opacity="0.12" stroke="#34C29A" stroke-width="2.5"/>
    <text x="905" y="146" font-weight="700" fill="#34C29A">PROMOTED</text>
  </g>

  <!-- forward arrows -->
  <g stroke="#4A5468" stroke-width="2">
    <line x1="224" y1="140" x2="252" y2="140"/>
    <line x1="400" y1="140" x2="428" y2="140"/>
    <line x1="657" y1="140" x2="685" y2="140"/>
    <line x1="815" y1="140" x2="843" y2="140"/>
  </g>
  <g fill="#4A5468">
    <path d="M 264 140 L 252 134.5 L 252 145.5 Z"/>
    <path d="M 440 140 L 428 134.5 L 428 145.5 Z"/>
    <path d="M 697 140 L 685 134.5 L 685 145.5 Z"/>
    <path d="M 855 140 L 843 134.5 L 843 145.5 Z"/>
  </g>

  <!-- NARROW side rail -->
  <line x1="548.5" y1="162" x2="548.5" y2="238" stroke="#ECA43F" stroke-width="1.5" stroke-dasharray="4 4" stroke-opacity="0.7"/>
  <path d="M 548.5 248 L 543 236 L 554 236 Z" fill="#ECA43F" fill-opacity="0.8"/>
  <rect x="440" y="236" width="92" height="32" rx="16" fill="none" stroke="#ECA43F" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="486" y="257" text-anchor="middle" font-size="14" fill="#ECA43F"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">NARROW</text>
  <line x1="540" y1="252" x2="955" y2="252" stroke="#ECA43F" stroke-width="1.5" stroke-dasharray="5 6" stroke-opacity="0.5"/>
  <text x="955" y="243" text-anchor="end" font-size="12.5" fill="#B58A45"
        font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">scope reduced — the claim survives, smaller</text>

  <!-- REJECTED side rail -->
  <line x1="332" y1="162" x2="332" y2="298" stroke="#E36855" stroke-width="1.5" stroke-dasharray="4 4" stroke-opacity="0.7"/>
  <path d="M 332 308 L 326.5 296 L 337.5 296 Z" fill="#E36855" fill-opacity="0.8"/>
  <line x1="756" y1="162" x2="756" y2="308" stroke="#E36855" stroke-width="1.5" stroke-dasharray="4 4" stroke-opacity="0.5"/>
  <path d="M 756 318 L 750.5 306 L 761.5 306 Z" fill="#E36855" fill-opacity="0.7"/>
  <rect x="264" y="306" width="104" height="32" rx="16" fill="none" stroke="#E36855" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="316" y="327" text-anchor="middle" font-size="14" fill="#E36855"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">REJECTED</text>
  <line x1="376" y1="322" x2="955" y2="322" stroke="#E36855" stroke-width="1.5" stroke-dasharray="5 6" stroke-opacity="0.5"/>
  <text x="955" y="313" text-anchor="end" font-size="12.5" fill="#B05E52"
        font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">dropped — recorded in negative results</text>

  <!-- footer -->
  <text x="540" y="392" text-anchor="middle" font-size="14" font-style="italic" fill="#5D6678"
        font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">promotion is earned — demotion is honest, and recorded.</text>
</svg>
