<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 640" role="img" aria-label="The PIÉNSALO loop: understand, plan, execute, inspect, repair, verify, continue — with a first-class exit labelled no intervention needed.">
  <title>The PIÉNSALO loop</title>
  <desc>Seven-stage cognitive lifecycle drawn as a ring. From INSPECT, a legitimate exit leads to NO INTERVENTION NEEDED.</desc>

  <rect width="980" height="640" fill="#10141C"/>

  <text x="40" y="52" font-size="15" letter-spacing="4" fill="#98A0B3"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">THE PIÉNSALO LOOP</text>

  <!-- ring -->
  <circle cx="400" cy="320" r="200" fill="none" stroke="#2A3242" stroke-width="2.5"/>

  <!-- direction arrows (clockwise) -->
  <g fill="#4A5468">
    <path d="M 9 0 L -7 -6 L -7 6 Z" transform="translate(275.3,163.6) rotate(-38.57)"/>
    <path d="M 9 0 L -7 -6 L -7 6 Z" transform="translate(444.5,125.0) rotate(12.86)"/>
    <path d="M 9 0 L -7 -6 L -7 6 Z" transform="translate(580.2,233.2) rotate(64.29)"/>
    <path d="M 9 0 L -7 -6 L -7 6 Z" transform="translate(580.2,406.8) rotate(115.71)"/>
    <path d="M 9 0 L -7 -6 L -7 6 Z" transform="translate(444.5,515.0) rotate(167.14)"/>
    <path d="M 9 0 L -7 -6 L -7 6 Z" transform="translate(275.3,476.4) rotate(218.57)"/>
    <path d="M 9 0 L -7 -6 L -7 6 Z" transform="translate(200,320) rotate(270)"/>
  </g>

  <!-- stage nodes -->
  <g stroke="#10141C" stroke-width="3">
    <circle cx="219.8" cy="233.2" r="9"  fill="#A7AFBF"/>
    <circle cx="355.5" cy="125.0" r="9"  fill="#A7AFBF"/>
    <circle cx="524.7" cy="163.6" r="9"  fill="#A7AFBF"/>
    <circle cx="600"   cy="320"   r="11" fill="#ECA43F"/>
    <circle cx="524.7" cy="476.4" r="9"  fill="#A7AFBF"/>
    <circle cx="355.5" cy="515.0" r="9"  fill="#34C29A"/>
    <circle cx="219.8" cy="406.8" r="9"  fill="#A7AFBF"/>
  </g>

  <!-- stage labels -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace"
     font-size="17" fill="#E8E4DA">
    <text x="196" y="230" text-anchor="end"><tspan fill="#8A6A2F">1</tspan> UNDERSTAND</text>
    <text x="355" y="100" text-anchor="middle"><tspan fill="#8A6A2F">2</tspan> PLAN</text>
    <text x="548" y="150" text-anchor="start"><tspan fill="#8A6A2F">3</tspan> EXECUTE</text>
    <text x="600" y="286" text-anchor="middle"><tspan fill="#8A6A2F">4</tspan> INSPECT</text>
    <text x="548" y="502" text-anchor="start"><tspan fill="#8A6A2F">5</tspan> REPAIR</text>
    <text x="355" y="550" text-anchor="middle"><tspan fill="#8A6A2F">6</tspan> VERIFY</text>
    <text x="196" y="422" text-anchor="end"><tspan fill="#8A6A2F">7</tspan> CONTINUE</text>
  </g>

  <!-- centre mark -->
  <path d="M 388 276 L 397 258 L 411 258 L 402 276 Z" fill="#ECA43F"/>
  <text x="400" y="316" text-anchor="middle" font-size="30" font-weight="700" fill="#F3EFE7"
        font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">piénsalo</text>
  <text x="400" y="344" text-anchor="middle" font-size="16" font-style="italic" fill="#98A0B3"
        font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">think it through</text>
  <text x="400" y="372" text-anchor="middle" font-size="13" fill="#5D6678"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">consider · inspect · verify · stop</text>

  <!-- abstention exit: a legitimate path, not a failure -->
  <line x1="613" y1="320" x2="662" y2="320" stroke="#34C29A" stroke-width="2.5"/>
  <path d="M 674 320 L 660 313.5 L 660 326.5 Z" fill="#34C29A"/>
  <rect x="680" y="294" width="264" height="52" rx="26" fill="#34C29A" fill-opacity="0.10"
        stroke="#34C29A" stroke-width="2"/>
  <text x="812" y="326" text-anchor="middle" font-size="16" font-weight="700" fill="#34C29A"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">NO INTERVENTION NEEDED</text>
  <g font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
     font-size="13" fill="#98A0B3" text-anchor="middle">
    <text x="812" y="372">no defects observed — deliver as-is.</text>
    <text x="812" y="392">a first-class outcome, not a failure.</text>
  </g>

  <!-- footer -->
  <text x="400" y="612" text-anchor="middle" font-size="13" fill="#5D6678"
        font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">CONTINUE returns the loop to UNDERSTAND — until VERIFY passes, or no intervention is needed.</text>
</svg>
